#pgbouncer.ini

[databases]
* = host = postgres port=5432 user=ollama_user password=change_me_in_production dbname=ollama_db

[pgbouncer]
listen_addr = 0.0.0.0
auth_type = any
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 10
ignore_startup_parameters = extra_float_digits

# Log settings
admin_users = postgres

