# Nginx VPS reverse-proxy template (without Traefik)
#
# Replace these placeholders before enabling:
# - OLLAMA_DOMAIN_PLACEHOLDER    (ex: ollama.example.com)
# - CONFIG_DOMAIN_PLACEHOLDER    (ex: config.example.com)
# - OLLAMA_HOST_PORT_PLACEHOLDER (ex: 21434)
# - CONFIG_HOST_PORT_PLACEHOLDER (ex: 18888)
# - TLS_CERT_PATH_PLACEHOLDER    (ex: /etc/letsencrypt/live/ollama.example.com/fullchain.pem)
# - TLS_KEY_PATH_PLACEHOLDER     (ex: /etc/letsencrypt/live/ollama.example.com/privkey.pem)
#
# This file is intended for /etc/nginx/sites-available/ollama-stack.conf

map $host $upstream_target {
    default                        "";
    OLLAMA_DOMAIN_PLACEHOLDER      "http://127.0.0.1:OLLAMA_HOST_PORT_PLACEHOLDER";
    CONFIG_DOMAIN_PLACEHOLDER      "http://127.0.0.1:CONFIG_HOST_PORT_PLACEHOLDER";
}

server {
    listen 80;
    server_name OLLAMA_DOMAIN_PLACEHOLDER CONFIG_DOMAIN_PLACEHOLDER;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name OLLAMA_DOMAIN_PLACEHOLDER CONFIG_DOMAIN_PLACEHOLDER;

    ssl_certificate TLS_CERT_PATH_PLACEHOLDER;
    ssl_certificate_key TLS_KEY_PATH_PLACEHOLDER;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    if ($upstream_target = "") {
        return 444;
    }

    location / {
        proxy_pass $upstream_target;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
