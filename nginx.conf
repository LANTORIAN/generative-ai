# Configuration Nginx pour validation stricte du domaine bluevaloris.com
# Fichier optionnel pour sécurité maximale

events {
    worker_connections 1024;
}

http {
    upstream ollama {
        server ollama:11434;
    }

    # Logging amélioré pour audit
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'Host: "$http_host" Domain-Check: "$valid_domain"';

    access_log /var/log/nginx/access.log detailed;
    error_log /var/log/nginx/error.log warn;

    # Map pour validation du domaine
    map $http_host $valid_domain {
        default 0;
        "~^.*\.bluevaloris\.com$" 1;
        "~^ollama\.bluevaloris\.com$" 1;
    }

    server {
        listen 8080;
        server_name _;

        # Réjecter les requêtes avec host invalide
        if ($valid_domain = 0) {
            return 403;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Logs pour domaine accepté
        access_log /var/log/nginx/ollama-access.log detailed;

        # Health check endpoint
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Proxy vers Ollama
        location / {
            proxy_pass http://ollama;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts pour long polling
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffering pour streaming
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # API endpoints spécifiques
        location ~ ^/api/(generate|chat|tags|pull|list) {
            proxy_pass http://ollama;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
