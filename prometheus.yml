# Configuration Prometheus pour monitoring
# Collecte les métriques de tous les services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ollama-production'

scrape_configs:
  # Node Exporter - Métriques système
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'system'

  # cAdvisor - Métriques conteneurs
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'

  # Docker Socket Exporter (optionnel)
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']

  # Ollama healthcheck endpoint
  - job_name: 'ollama'
    static_configs:
      - targets: ['localhost:11434']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Redis exporter (si disponible)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    scrape_interval: 30s

# Alerting rules (optionnel)
rule_files:
  # - /etc/prometheus/alert-rules.yml

alertmanagers: []
